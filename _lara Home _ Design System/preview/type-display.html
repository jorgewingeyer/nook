<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); padding: 24px 28px; }
  .specimen { margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 18px; }
  .specimen:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .meta { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta">Hero — Cormorant Garamond Light 300</div>
    <div style="font-family:var(--font-display);font-size:clamp(2.4rem,5vw,4rem);font-weight:300;line-height:1.15;letter-spacing:-0.02em;color:var(--espresso)">Tu hogar,<br><em>tu mejor obra de arte.</em></div>
  </div>
  <div class="specimen">
    <div class="meta">H2 — Cormorant Garamond Light 300</div>
    <div style="font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:300;line-height:1.3;color:var(--espresso)">Colección Primavera 2026</div>
  </div>
  <div class="specimen">
    <div class="meta">H3 — Cormorant Garamond Regular 400 Italic</div>
    <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:400;font-style:italic;line-height:1.35;color:var(--gold-dark)">Piezas que cuentan historias</div>
  </div>
</body>
</html>
