<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--parchment); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .section { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 10px; margin-top: 16px; }
  .section:first-child { margin-top: 0; }

  /* Product Card */
  .card { background: var(--warm-white); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); width: 180px; transition: box-shadow 220ms ease, transform 220ms ease; cursor: pointer; }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .card-img { width: 100%; height: 120px; background: linear-gradient(135deg, #E8D5B7 0%, #D4B896 100%); position: relative; display: flex; align-items: center; justify-content: center; }
  .img-placeholder { width: 56px; height: 56px; opacity: 0.25; }
  .card-badge { position: absolute; top: 8px; left: 8px; background: var(--espresso); color: var(--gold-light); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-pill); }
  .card-body { padding: 12px; }
  .card-cat { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 4px; }
  .card-name { font-family: var(--font-display); font-size: 1rem; font-weight: 400; color: var(--espresso); line-height: 1.3; margin-bottom: 6px; }
  .card-price { display: flex; align-items: baseline; gap: 6px; }
  .price-main { font-size: 15px; font-weight: 600; color: var(--espresso); }
  .price-old { font-size: 12px; color: var(--warm-gray); text-decoration: line-through; }
  .card-footer { padding: 0 12px 12px; display: flex; justify-content: space-between; align-items: center; }
  .stars { color: var(--gold); font-size: 11px; letter-spacing: 1px; }
  .reviews { font-size: 9px; color: var(--warm-gray); margin-left: 4px; }
  .heart { color: var(--blush); font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <div class="section">Product Cards</div>
  <div class="row">
    <!-- Default card -->
    <div class="card">
      <div class="card-img">
        <svg class="img-placeholder" viewBox="0 0 56 56" fill="none"><rect x="8" y="20" width="40" height="28" rx="2" stroke="#2E1F0E" stroke-width="1.5"/><path d="M20 20v-6a8 8 0 0116 0v6" stroke="#2E1F0E" stroke-width="1.5"/></svg>
      </div>
      <div class="card-body">
        <div class="card-cat">Iluminación</div>
        <div class="card-name">Lámpara Nórdica Ambre</div>
        <div class="card-price"><span class="price-main">$89.900</span></div>
      </div>
      <div class="card-footer">
        <div><span class="stars">★★★★★</span><span class="reviews">(24)</span></div>
        <span class="heart">♡</span>
      </div>
    </div>
    <!-- Sale card -->
    <div class="card">
      <div class="card-img">
        <div class="card-badge">−20%</div>
        <svg class="img-placeholder" viewBox="0 0 56 56" fill="none"><ellipse cx="28" cy="38" rx="18" ry="6" stroke="#2E1F0E" stroke-width="1.5"/><path d="M10 38V22c0-8 36-8 36 0v16" stroke="#2E1F0E" stroke-width="1.5"/></svg>
      </div>
      <div class="card-body">
        <div class="card-cat">Textiles</div>
        <div class="card-name">Almohadón Lino Natural</div>
        <div class="card-price"><span class="price-main">$34.900</span><span class="price-old">$43.900</span></div>
      </div>
      <div class="card-footer">
        <div><span class="stars">★★★★</span><span class="reviews">(11)</span></div>
        <span class="heart" style="color:var(--blush);opacity:1">♥</span>
      </div>
    </div>
    <!-- New card -->
    <div class="card">
      <div class="card-img">
        <div class="card-badge" style="background:var(--gold)">Nuevo</div>
        <svg class="img-placeholder" viewBox="0 0 56 56" fill="none"><rect x="12" y="12" width="32" height="32" rx="4" stroke="#2E1F0E" stroke-width="1.5"/><path d="M20 28h16M28 20v16" stroke="#2E1F0E" stroke-width="1.5"/></svg>
      </div>
      <div class="card-body">
        <div class="card-cat">Decoración</div>
        <div class="card-name">Jarrón Cerámica Osaka</div>
        <div class="card-price"><span class="price-main">$62.500</span></div>
      </div>
      <div class="card-footer">
        <div><span class="stars">★★★★★</span><span class="reviews">(3)</span></div>
        <span class="heart">♡</span>
      </div>
    </div>
  </div>
</body>
</html>
