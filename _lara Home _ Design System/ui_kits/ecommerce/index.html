<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook — Tu rincón favorito</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); font-family: var(--font-body); color: var(--fg1); -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--cream); } ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 3px; }
</style>
</head>
<body>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProductCard.jsx"></script>
<script type="text/babel" src="CartDrawer.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
const { useState } = React;

const PRODUCTS = [
  { id:1, name:'Lámpara Arco Dorada', category:'Iluminación', price:89900, stars:5, reviews:24, badge:'Nuevo', badgeStyle:'new', image:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=600&h=700&fit=crop&q=80' },
  { id:2, name:'Jarrón Cerámica Osaka', category:'Jarrones', price:62500, stars:5, reviews:18, badge:'Nuevo', badgeStyle:'new', image:'https://images.unsplash.com/photo-1616047006789-b7af5afb8c20?w=600&h=700&fit=crop&q=80' },
  { id:3, name:'Set de Platos Stoneware', category:'Platos', price:54900, oldPrice:68900, stars:4, reviews:11, badge:'−20%', badgeStyle:'sale', image:'https://images.unsplash.com/photo-1544145945-f90425340c7e?w=600&h=700&fit=crop&q=80' },
  { id:4, name:'Copas Cristal Bohemia', category:'Copas', price:38900, stars:5, reviews:32, image:'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=600&h=700&fit=crop&q=80' },
  { id:5, name:'Vela Cedro & Sándalo', category:'Velas', price:18900, stars:4, reviews:42, badge:'Popular', badgeStyle:'hot', image:'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=600&h=700&fit=crop&q=80' },
  { id:6, name:'Lámpara de Mesa Rattan', category:'Iluminación', price:74900, stars:4, reviews:9, image:'https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=600&h=700&fit=crop&q=80' },
  { id:7, name:'Jarrón Terracota Artesanal', category:'Jarrones', price:46000, stars:5, reviews:7, image:'https://images.unsplash.com/photo-1581783342308-f792dbdd27c5?w=600&h=700&fit=crop&q=80' },
  { id:8, name:'Copas Vino Cristal Fino', category:'Copas', price:58900, oldPrice:72000, stars:5, reviews:14, badge:'−18%', badgeStyle:'sale', image:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&h=700&fit=crop&q=80' },
];

const CATEGORIES = ['Todos','Iluminación','Jarrones','Platos','Copas','Velas'];

const TrustBar = () => (
  <div style={{ background:'var(--warm-white)', borderBottom:'1px solid var(--border)', padding:'12px 48px', display:'flex', justifyContent:'center', gap:'48px', flexWrap:'wrap' }}>
    {[{icon:'🚚',text:'Envío gratis +$50.000'},{icon:'↩',text:'30 días de devolución'},{icon:'🔒',text:'Pago 100% seguro'},{icon:'★',text:'4.9 · +3.200 clientes'}].map(({icon,text})=>(
      <div key={text} style={{ display:'flex', alignItems:'center', gap:'7px', fontFamily:'var(--font-body)', fontSize:'12px', color:'var(--warm-gray)', letterSpacing:'0.04em' }}>
        <span style={{ color:'var(--gold)' }}>{icon}</span>{text}
      </div>
    ))}
  </div>
);

const CategorySection = ({ onAddToCart }) => {
  const [active, setActive] = useState('Todos');
  const filtered = active === 'Todos' ? PRODUCTS : PRODUCTS.filter(p => p.category === active);
  return (
    <section id="shop" style={{ padding:'80px 48px' }}>
      <div style={{ textAlign:'center', marginBottom:'40px' }}>
        <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--gold)', marginBottom:'10px' }}>✦ Nuestros productos</div>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(1.8rem,3vw,2.8rem)', fontWeight:300, color:'var(--espresso)', marginBottom:'28px' }}>Piezas que transforman rincones</h2>
        <div style={{ display:'flex', gap:'8px', justifyContent:'center', flexWrap:'wrap' }}>
          {CATEGORIES.map(cat => (
            <button key={cat} onClick={()=>setActive(cat)} style={{ padding:'7px 18px', borderRadius:'var(--radius-pill)', border:'1.5px solid', borderColor: active===cat ? 'var(--espresso)':'var(--border-strong)', background: active===cat ? 'var(--espresso)':'transparent', color: active===cat ? 'var(--cream)':'var(--warm-gray)', fontFamily:'var(--font-body)', fontSize:'11px', fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase', cursor:'pointer', transition:'all 200ms' }}>{cat}</button>
          ))}
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:'20px', maxWidth:'1200px', margin:'0 auto' }}>
        {filtered.map(p => <ProductCard key={p.id} {...p} onAddToCart={()=>onAddToCart(p)} />)}
      </div>
      <div style={{ textAlign:'center', marginTop:'48px' }}>
        <a href="#" style={{ fontFamily:'var(--font-body)', fontSize:'12px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--espresso)', borderBottom:'1.5px solid var(--gold)', paddingBottom:'3px', textDecoration:'none' }}>Ver toda la colección →</a>
      </div>
    </section>
  );
};

const EditorialBanner = () => (
  <section style={{ display:'grid', gridTemplateColumns:'1fr 1fr', minHeight:'520px', overflow:'hidden' }}>
    <div style={{ position:'relative', overflow:'hidden' }}>
      <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=900&h=700&fit=crop&q=80" alt="Nook interior" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
    </div>
    <div style={{ background:'var(--espresso)', display:'flex', flexDirection:'column', justifyContent:'center', padding:'64px 56px' }}>
      <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--gold-light)', marginBottom:'16px' }}>✦ Nuestra filosofía</div>
      <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(1.8rem,2.8vw,2.8rem)', fontWeight:300, color:'var(--cream)', lineHeight:1.2, marginBottom:'20px' }}>
        No vendemos objetos.<br /><em style={{ color:'var(--gold-light)' }}>Creamos rincones.</em>
      </h2>
      <p style={{ fontFamily:'var(--font-body)', fontSize:'14px', fontWeight:300, color:'rgba(245,237,224,0.65)', lineHeight:1.8, marginBottom:'32px' }}>
        Nook nació de observar cómo las personas gravitan hacia esos espacios especiales — el rincón del café, el lugar junto a la ventana, el sillón heredado que combina perfecto con la lámpara nueva. Cada pieza que elegimos cuenta una historia.
      </p>
      <button style={{ alignSelf:'flex-start', padding:'12px 28px', borderRadius:'var(--radius-pill)', border:'1.5px solid var(--gold-light)', background:'transparent', color:'var(--gold-light)', fontFamily:'var(--font-body)', fontSize:'12px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' }}>Conocé nuestra historia</button>
    </div>
  </section>
);

const CategoryGrid = () => {
  const cats = [
    { label:'Iluminación', img:'https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=500&h=600&fit=crop&q=80' },
    { label:'Jarrones', img:'https://images.unsplash.com/photo-1616047006789-b7af5afb8c20?w=500&h=600&fit=crop&q=80' },
    { label:'Platos', img:'https://images.unsplash.com/photo-1544145945-f90425340c7e?w=500&h=600&fit=crop&q=80' },
    { label:'Copas & Velas', img:'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=500&h=600&fit=crop&q=80' },
  ];
  return (
    <section style={{ padding:'80px 48px', background:'var(--parchment)' }}>
      <div style={{ textAlign:'center', marginBottom:'40px' }}>
        <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--gold)', marginBottom:'10px' }}>✦ Explorá</div>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(1.8rem,3vw,2.6rem)', fontWeight:300, color:'var(--espresso)' }}>Nuestras categorías</h2>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px', maxWidth:'1200px', margin:'0 auto' }}>
        {cats.map(c => (
          <div key={c.label} style={{ position:'relative', borderRadius:'var(--radius-md)', overflow:'hidden', cursor:'pointer', height:'320px' }}
            onMouseOver={e => e.currentTarget.querySelector('img').style.transform = 'scale(1.06)'}
            onMouseOut={e => e.currentTarget.querySelector('img').style.transform = 'scale(1)'}
          >
            <img src={c.img} alt={c.label} style={{ width:'100%', height:'100%', objectFit:'cover', transition:'transform 400ms ease' }} />
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(46,31,14,0.62) 0%, transparent 55%)' }} />
            <div style={{ position:'absolute', bottom:'20px', left:'20px', fontFamily:'var(--font-display)', fontSize:'1.3rem', fontWeight:400, color:'white' }}>{c.label}</div>
          </div>
        ))}
      </div>
    </section>
  );
};

const ReviewsSection = () => {
  const reviews = [
    { name:'Valentina M.', city:'Buenos Aires', stars:5, text:'La calidad supera cualquier expectativa. El packaging fue increíble — llegó como si fuera un regalo especial. Definitivamente vuelvo a comprar en Nook.' },
    { name:'Carolina B.', city:'Córdoba', stars:5, text:'El jarrón es exactamente como en las fotos, incluso más lindo en persona. Llegó perfectamente embalado y antes de lo prometido.' },
    { name:'Luciana R.', city:'Rosario', stars:5, text:'La atención al cliente es de otro nivel. Me ayudaron a elegir el set perfecto para mi comedor. Nook se convirtió en mi tienda favorita.' },
  ];
  return (
    <section style={{ background:'var(--warm-white)', padding:'80px 48px' }}>
      <div style={{ textAlign:'center', marginBottom:'48px' }}>
        <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--gold)', marginBottom:'10px' }}>✦ Testimonios</div>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(1.8rem,3vw,2.6rem)', fontWeight:300, color:'var(--espresso)' }}>Lo que dicen nuestras clientas</h2>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))', gap:'20px', maxWidth:'1000px', margin:'0 auto' }}>
        {reviews.map((r,i) => (
          <div key={i} style={{ background:'var(--cream)', borderRadius:'var(--radius-md)', padding:'28px', border:'1px solid var(--border)' }}>
            <div style={{ color:'var(--gold)', fontSize:'13px', letterSpacing:'2px', marginBottom:'14px' }}>{'★'.repeat(r.stars)}</div>
            <p style={{ fontFamily:'var(--font-display)', fontSize:'1.05rem', fontWeight:400, fontStyle:'italic', color:'var(--espresso)', lineHeight:1.65, marginBottom:'18px' }}>"{r.text}"</p>
            <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--warm-gray)' }}>{r.name} · {r.city}</div>
          </div>
        ))}
      </div>
    </section>
  );
};

const App = () => {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  const addToCart = (product) => {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      return ex ? prev.map(i => i.id===product.id ? {...i,qty:i.qty+1} : i) : [...prev,{...product,qty:1}];
    });
    setCartOpen(true);
  };

  return (
    <>
      <Header cartCount={cart.reduce((s,i)=>s+i.qty,0)} wishlistCount={2} onCartOpen={()=>setCartOpen(true)} />
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} items={cart} onRemove={i=>setCart(prev=>prev.filter((_,j)=>j!==i))} />
      <main>
        <Hero onShop={()=>document.getElementById('shop').scrollIntoView({behavior:'smooth'})} />
        <TrustBar />
        <CategorySection onAddToCart={addToCart} />
        <EditorialBanner />
        <CategoryGrid />
        <ReviewsSection />
      </main>
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
