<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook — Iluminación</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--sand);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 2px 6px rgba(184,148,95,0.4)}
</style>
</head>
<body>
<script type="text/babel">
const { useState, useMemo } = React;

const ALL_PRODUCTS = [
  { id:1, name:'Lámpara Arco Dorada', category:'Iluminación', sub:'Lámparas de pie', price:89900, stars:5, reviews:24, badge:'Nuevo', material:'Metal', color:'Dorado', image:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:2, name:'Lámpara de Mesa Rattan', category:'Iluminación', sub:'Lámparas de mesa', price:74900, stars:4, reviews:9, material:'Rattan', color:'Natural', image:'https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:3, name:'Aplique de Pared Latón', category:'Iluminación', sub:'Apliques', price:52000, stars:5, reviews:16, badge:'Popular', material:'Latón', color:'Dorado', image:'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:4, name:'Lámpara Colgante Mármol', category:'Iluminación', sub:'Colgantes', price:118000, stars:5, reviews:7, material:'Mármol', color:'Blanco', image:'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:5, name:'Tira LED Cálida Premium', category:'Iluminación', sub:'LED', price:28900, oldPrice:36000, stars:4, reviews:31, badge:'−20%', material:'Silicona', color:'Blanco', image:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:6, name:'Lámpara Industrial Hierro', category:'Iluminación', sub:'Lámparas de pie', price:96500, stars:4, reviews:12, material:'Hierro', color:'Negro', image:'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&h=600&fit=crop&q=80', inStock:false },
  { id:7, name:'Aplique Arco Minimalista', category:'Iluminación', sub:'Apliques', price:64000, stars:5, reviews:4, badge:'Nuevo', material:'Metal', color:'Negro', image:'https://images.unsplash.com/photo-1530018352490-c6eef07fd7d1?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:8, name:'Lámpara Globo Soplado', category:'Iluminación', sub:'Colgantes', price:83000, stars:5, reviews:19, material:'Vidrio', color:'Ámbar', image:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=500&h=600&fit=crop&q=80', inStock:true },
  { id:9, name:'Lámpara Velador Lino', category:'Iluminación', sub:'Lámparas de mesa', price:46900, stars:4, reviews:8, material:'Lino', color:'Natural', image:'https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=500&h=600&fit=crop&q=80', inStock:true },
];

const SORT_OPTIONS = ['Recomendados','Precio: menor a mayor','Precio: mayor a menor','Más valorados','Novedades'];
const MATERIALS = ['Metal','Rattan','Latón','Mármol','Hierro','Vidrio','Lino','Silicona'];
const COLORS = ['Dorado','Natural','Negro','Blanco','Ámbar'];
const SUBCATS = ['Todos','Lámparas de pie','Lámparas de mesa','Apliques','Colgantes','LED'];

const NookLogo = () => (
  <a href="index.html" style={{textDecoration:'none',display:'flex',alignItems:'center',gap:'9px'}}>
    <svg width="28" height="34" viewBox="0 0 36 48" fill="none">
      <path d="M4 44 L4 20 Q4 4 18 4 Q32 4 32 20 L32 44" stroke="#B8945F" strokeWidth="2" strokeLinecap="round"/>
      <path d="M11 44 L11 22 Q11 12 18 12 Q25 12 25 22 L25 44" stroke="#B8945F" strokeWidth="1.2" strokeLinecap="round" opacity="0.4"/>
      <line x1="0" y1="44" x2="36" y2="44" stroke="#B8945F" strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
    <span style={{fontFamily:'var(--font-display)',fontSize:'24px',fontWeight:400,letterSpacing:'2px',color:'var(--espresso)',lineHeight:1}}>nook</span>
  </a>
);

const FilterSection = ({ title, children }) => {
  const [open,setOpen]=useState(true);
  return (
    <div style={{borderBottom:'1px solid var(--border)',paddingBottom:'0'}}>
      <button onClick={()=>setOpen(!open)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--espresso)'}}>
        {title}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warm-gray)" strokeWidth="2" strokeLinecap="round" style={{transition:'transform 250ms',transform:open?'rotate(180deg)':'rotate(0)'}}><path d="m6 9 6 6 6-6"/></svg>
      </button>
      {open && <div style={{paddingBottom:'16px'}}>{children}</div>}
    </div>
  );
};

const Checkbox = ({ label, checked, onChange, count }) => (
  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'4px 0'}}>
    <div onClick={onChange} style={{width:'16px',height:'16px',borderRadius:'4px',border:`1.5px solid ${checked?'var(--gold)':'var(--border-strong)'}`,background:checked?'var(--gold)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 200ms',cursor:'pointer'}}>
      {checked && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
    </div>
    <span style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--espresso)',flex:1}}>{label}</span>
    {count!=null && <span style={{fontFamily:'var(--font-body)',fontSize:'11px',color:'var(--warm-gray)'}}>({count})</span>}
  </label>
);

const ColorDot = ({ color, hex, selected, onClick }) => (
  <button onClick={onClick} title={color} style={{width:'28px',height:'28px',borderRadius:'50%',background:hex,border:`2px solid ${selected?'var(--espresso)':'transparent'}`,outline: selected?'2px solid var(--warm-white)':'none',outlineOffset:'-4px',cursor:'pointer',transition:'all 180ms',boxShadow:'var(--shadow-xs)'}}/>
);

const COLOR_HEX = { Dorado:'#B8945F', Natural:'#C4A882', Negro:'#1A1410', Blanco:'#FAF6F1', Ámbar:'#D4752A' };

const ProductCard = ({ p, onAdd }) => {
  const [hov,setHov]=useState(false);
  const [wished,setWished]=useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:'var(--warm-white)',borderRadius:'var(--radius-md)',overflow:'hidden',border:'1px solid var(--border)',boxShadow:hov?'var(--shadow-md)':'var(--shadow-xs)',transform:hov?'translateY(-3px)':'none',transition:'all 240ms ease',cursor:'pointer'}}>
      <div style={{position:'relative',height:'220px',overflow:'hidden',background:'var(--parchment)'}}>
        <img src={p.image} alt={p.name} style={{width:'100%',height:'100%',objectFit:'cover',transition:'transform 400ms',transform:hov?'scale(1.05)':'scale(1)'}}/>
        {p.badge && <div style={{position:'absolute',top:'10px',left:'10px',background: p.badge.includes('%')?'var(--espresso)':'var(--gold)',color:'white',fontSize:'9px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'3px 9px',borderRadius:'var(--radius-pill)',fontFamily:'var(--font-body)'}}>{p.badge}</div>}
        {!p.inStock && <div style={{position:'absolute',inset:0,background:'rgba(245,237,224,0.7)',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:600,color:'var(--warm-gray)',letterSpacing:'0.1em',textTransform:'uppercase'}}>Sin stock</span></div>}
        <button onClick={e=>{e.stopPropagation();setWished(!wished);}} style={{position:'absolute',top:'8px',right:'8px',background:'rgba(250,246,241,0.92)',border:'none',borderRadius:'50%',width:'30px',height:'30px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'14px',color:wished?'#C9A0A0':'#B8A090'}}>{wished?'♥':'♡'}</button>
        {hov && p.inStock && <button onClick={e=>{e.stopPropagation();onAdd(p);}} style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(46,31,14,0.88)',color:'var(--cream)',border:'none',padding:'12px',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'11px',fontWeight:500,letterSpacing:'0.09em',textTransform:'uppercase'}}>+ Agregar al carrito</button>}
      </div>
      <div style={{padding:'12px 14px 14px'}}>
        <div style={{fontFamily:'var(--font-body)',fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--warm-gray)',marginBottom:'3px'}}>{p.sub}</div>
        <div style={{fontFamily:'var(--font-display)',fontSize:'1rem',color:'var(--espresso)',lineHeight:1.3,marginBottom:'7px'}}>{p.name}</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <span style={{fontFamily:'var(--font-body)',fontSize:'15px',fontWeight:600,color:'var(--espresso)'}}>${p.price.toLocaleString('es-AR')}</span>
            {p.oldPrice && <span style={{fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--warm-gray)',textDecoration:'line-through',marginLeft:'6px'}}>${p.oldPrice.toLocaleString('es-AR')}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
            <span style={{color:'var(--gold)',fontSize:'11px'}}>{'★'.repeat(Math.round(p.stars))}</span>
            <span style={{fontFamily:'var(--font-body)',fontSize:'10px',color:'var(--warm-gray)'}}>({p.reviews})</span>
          </div>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [priceRange,setPriceRange]=useState([0,130000]);
  const [materials,setMaterials]=useState([]);
  const [colors,setColors]=useState([]);
  const [subcat,setSubcat]=useState('Todos');
  const [inStockOnly,setInStockOnly]=useState(false);
  const [sort,setSort]=useState('Recomendados');
  const [cart,setCart]=useState([]);
  const [view,setView]=useState('grid'); // grid | list

  const activeFilters = [...materials,...colors,...(inStockOnly?['En stock']:[]),(priceRange[0]>0||priceRange[1]<130000)?[`$${(priceRange[0]/1000).toFixed(0)}k–$${(priceRange[1]/1000).toFixed(0)}k`]:[]].flat();

  const toggleArr = (arr,setArr,val) => setArr(prev=>prev.includes(val)?prev.filter(v=>v!==val):[...prev,val]);

  const filtered = useMemo(() => {
    let r = ALL_PRODUCTS.filter(p=>{
      if(subcat!=='Todos' && p.sub!==subcat) return false;
      if(p.price < priceRange[0] || p.price > priceRange[1]) return false;
      if(materials.length && !materials.includes(p.material)) return false;
      if(colors.length && !colors.includes(p.color)) return false;
      if(inStockOnly && !p.inStock) return false;
      return true;
    });
    if(sort==='Precio: menor a mayor') r=[...r].sort((a,b)=>a.price-b.price);
    if(sort==='Precio: mayor a menor') r=[...r].sort((a,b)=>b.price-a.price);
    if(sort==='Más valorados') r=[...r].sort((a,b)=>b.stars-a.stars||b.reviews-a.reviews);
    return r;
  },[priceRange,materials,colors,inStockOnly,sort,subcat]);

  const addToCart=(p)=>setCart(prev=>{const ex=prev.find(i=>i.id===p.id);return ex?prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...prev,{...p,qty:1}];});

  return (
    <div style={{minHeight:'100vh',background:'var(--cream)'}}>
      {/* Header */}
      <header style={{background:'var(--warm-white)',borderBottom:'1px solid var(--border)',padding:'0 48px',height:'64px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
        <NookLogo/>
        <nav style={{display:'flex',gap:'20px'}}>
          {['Iluminación','Jarrones','Platos','Copas','Velas'].map(l=>(
            <a key={l} href="index.html" style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight: l==='Iluminación'?600:400,letterSpacing:'0.08em',textTransform:'uppercase',color: l==='Iluminación'?'var(--gold)':'var(--espresso)',textDecoration:'none',borderBottom: l==='Iluminación'?'1.5px solid var(--gold)':'none',paddingBottom:'2px'}}>{l}</a>
          ))}
        </nav>
        <button style={{position:'relative',display:'flex',alignItems:'center',gap:'7px',background:'var(--espresso)',color:'var(--cream)',border:'none',borderRadius:'var(--radius-pill)',padding:'8px 16px',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:500,letterSpacing:'0.06em'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Carrito {cart.length>0&&<span style={{background:'var(--gold)',color:'white',width:'16px',height:'16px',borderRadius:'50%',fontSize:'9px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{cart.reduce((s,i)=>s+i.qty,0)}</span>}
        </button>
      </header>

      {/* Breadcrumb */}
      <div style={{padding:'12px 48px',borderBottom:'1px solid var(--border)',background:'var(--warm-white)',display:'flex',gap:'8px',alignItems:'center',fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--warm-gray)'}}>
        <a href="index.html" style={{color:'var(--warm-gray)',textDecoration:'none'}}>Inicio</a>
        <span style={{opacity:0.4}}>›</span>
        <span style={{color:'var(--espresso)',fontWeight:500}}>Iluminación</span>
        {subcat!=='Todos' && <><span style={{opacity:0.4}}>›</span><span style={{color:'var(--espresso)'}}>{subcat}</span></>}
      </div>

      <div style={{padding:'32px 48px',maxWidth:'1400px',margin:'0 auto',display:'grid',gridTemplateColumns:'260px 1fr',gap:'40px',alignItems:'start'}}>
        {/* Sidebar filters */}
        <aside style={{position:'sticky',top:'88px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <h2 style={{fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--espresso)'}}>Filtros</h2>
            {activeFilters.length>0 && <button onClick={()=>{setMaterials([]);setColors([]);setInStockOnly(false);setPriceRange([0,130000]);}} style={{background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'11px',color:'var(--warm-gray)',textDecoration:'underline'}}>Limpiar todo</button>}
          </div>

          <FilterSection title="Subcategoría">
            <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
              {SUBCATS.map(s=>(
                <button key={s} onClick={()=>setSubcat(s)} style={{padding:'6px 0',background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'13px',color: subcat===s?'var(--gold)':'var(--espresso)',fontWeight: subcat===s?600:400,textAlign:'left',transition:'color 180ms'}}>{s}</button>
              ))}
            </div>
          </FilterSection>

          <FilterSection title="Precio">
            <div style={{paddingRight:'4px'}}>
              <input type="range" min={0} max={130000} step={5000} value={priceRange[1]} onChange={e=>setPriceRange([priceRange[0],+e.target.value])}/>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:'8px',fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--warm-gray)'}}>
                <span>$0</span>
                <span style={{color:'var(--espresso)',fontWeight:500}}>hasta ${priceRange[1].toLocaleString('es-AR')}</span>
              </div>
            </div>
          </FilterSection>

          <FilterSection title="Material">
            <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
              {MATERIALS.map(m=>(
                <Checkbox key={m} label={m} checked={materials.includes(m)} onChange={()=>toggleArr(materials,setMaterials,m)} count={ALL_PRODUCTS.filter(p=>p.material===m).length}/>
              ))}
            </div>
          </FilterSection>

          <FilterSection title="Color">
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
              {COLORS.map(c=>(
                <ColorDot key={c} color={c} hex={COLOR_HEX[c]} selected={colors.includes(c)} onClick={()=>toggleArr(colors,setColors,c)}/>
              ))}
            </div>
          </FilterSection>

          <FilterSection title="Disponibilidad">
            <Checkbox label="Solo en stock" checked={inStockOnly} onChange={()=>setInStockOnly(!inStockOnly)} count={ALL_PRODUCTS.filter(p=>p.inStock).length}/>
          </FilterSection>
        </aside>

        {/* Main content */}
        <main>
          {/* Category header */}
          <div style={{marginBottom:'24px'}}>
            <h1 style={{fontFamily:'var(--font-display)',fontSize:'2.4rem',fontWeight:300,color:'var(--espresso)',marginBottom:'4px'}}>Iluminación</h1>
            <p style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--warm-gray)'}}>Lámparas y apliques que transforman la atmósfera de cada espacio.</p>
          </div>

          {/* Active filter chips */}
          {activeFilters.length>0 && (
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'20px'}}>
              {activeFilters.map(f=>(
                <span key={f} style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'5px 12px',background:'var(--espresso)',color:'var(--cream)',borderRadius:'var(--radius-pill)',fontFamily:'var(--font-body)',fontSize:'11px',fontWeight:500}}>
                  {f}
                  <span style={{cursor:'pointer',opacity:0.7}}>×</span>
                </span>
              ))}
            </div>
          )}

          {/* Toolbar */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',paddingBottom:'16px',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--warm-gray)'}}>{filtered.length} productos</span>
            <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
              <div style={{display:'flex',gap:'4px'}}>
                <button onClick={()=>setView('grid')} style={{padding:'6px',background: view==='grid'?'var(--espresso)':'transparent',border:'1px solid var(--border-strong)',borderRadius:'var(--radius-sm)',cursor:'pointer',color: view==='grid'?'var(--cream)':'var(--warm-gray)',display:'flex',alignItems:'center'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
                <button onClick={()=>setView('list')} style={{padding:'6px',background: view==='list'?'var(--espresso)':'transparent',border:'1px solid var(--border-strong)',borderRadius:'var(--radius-sm)',cursor:'pointer',color: view==='list'?'var(--cream)':'var(--warm-gray)',display:'flex',alignItems:'center'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
              </div>
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'7px 12px',border:'1.5px solid var(--border-strong)',borderRadius:'var(--radius-md)',fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--espresso)',background:'var(--warm-white)',outline:'none',cursor:'pointer'}}>
                {SORT_OPTIONS.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          </div>

          {/* Grid */}
          {view==='grid' ? (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:'16px'}}>
              {filtered.map(p=><ProductCard key={p.id} p={p} onAdd={addToCart}/>)}
              {filtered.length===0 && (
                <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px 0'}}>
                  <div style={{fontFamily:'var(--font-display)',fontSize:'1.3rem',fontWeight:300,color:'var(--warm-gray)',marginBottom:'8px'}}>No encontramos productos con esos filtros.</div>
                  <button onClick={()=>{setMaterials([]);setColors([]);setInStockOnly(false);setPriceRange([0,130000]);setSubcat('Todos');}} style={{fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--gold)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Limpiar filtros</button>
                </div>
              )}
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
              {filtered.map(p=>(
                <div key={p.id} style={{display:'grid',gridTemplateColumns:'120px 1fr auto',gap:'20px',background:'var(--warm-white)',borderRadius:'var(--radius-md)',border:'1px solid var(--border)',padding:'16px',alignItems:'center',cursor:'pointer',transition:'box-shadow 200ms'}}
                  onMouseOver={e=>e.currentTarget.style.boxShadow='var(--shadow-sm)'}
                  onMouseOut={e=>e.currentTarget.style.boxShadow='none'}
                >
                  <div style={{height:'90px',borderRadius:'var(--radius-sm)',overflow:'hidden',background:'var(--parchment)'}}>
                    <img src={p.image} alt={p.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  </div>
                  <div>
                    <div style={{fontFamily:'var(--font-body)',fontSize:'9px',letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--warm-gray)',marginBottom:'3px'}}>{p.sub}</div>
                    <div style={{fontFamily:'var(--font-display)',fontSize:'1.05rem',color:'var(--espresso)',marginBottom:'5px'}}>{p.name}</div>
                    <div style={{fontFamily:'var(--font-body)',fontSize:'11px',color:'var(--warm-gray)'}}>Material: {p.material} · Color: {p.color}</div>
                    <div style={{marginTop:'5px',color:'var(--gold)',fontSize:'12px'}}>{'★'.repeat(p.stars)} <span style={{fontFamily:'var(--font-body)',fontSize:'10px',color:'var(--warm-gray)'}}>({p.reviews})</span></div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--font-body)',fontSize:'16px',fontWeight:600,color:'var(--espresso)',marginBottom:'10px'}}>${p.price.toLocaleString('es-AR')}</div>
                    <button onClick={()=>addToCart(p)} style={{padding:'8px 16px',borderRadius:'var(--radius-pill)',border:'none',background: p.inStock?'var(--espresso)':'var(--parchment)',color: p.inStock?'var(--cream)':'var(--warm-gray)',fontFamily:'var(--font-body)',fontSize:'11px',fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',cursor: p.inStock?'pointer':'not-allowed'}}>{p.inStock?'Agregar':'Sin stock'}</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
