<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook — Mobile</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1A1410; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

  /* Phone frame */
  .phone-frame {
    width: 390px; height: 844px; background: var(--cream);
    border-radius: 48px; overflow: hidden; position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08), inset 0 0 0 1.5px rgba(0,0,0,0.3);
    display: flex; flex-direction: column;
  }
  /* Status bar */
  .status-bar {
    height: 52px; background: var(--cream); display: flex;
    align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px; flex-shrink: 0;
    position: relative; z-index: 10;
  }
  .dynamic-island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000; border-radius: 20px;
  }
  .status-time { font-size: 15px; font-weight: 600; color: var(--espresso); }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Scrollable content */
  .phone-content { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
  .phone-content::-webkit-scrollbar { display: none; }

  /* Bottom nav */
  .bottom-nav {
    height: 82px; background: rgba(250,246,241,0.97); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); display: flex;
    align-items: flex-start; justify-content: space-around;
    padding-top: 12px; flex-shrink: 0;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.04em; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useRef } = React;

const SCREENS = ['home','search','product','cart','profile'];

const PRODUCTS = [
  { id:1, name:'Lámpara Arco Dorada', category:'Iluminación', price:89900, stars:5, reviews:24, badge:'Nuevo', image:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&h=500&fit=crop&q=80' },
  { id:2, name:'Almohadones Lino', category:'Textiles', price:34900, oldPrice:43900, stars:4, reviews:11, badge:'−20%', image:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=500&fit=crop&q=80' },
  { id:3, name:'Jarrón Cerámica', category:'Decoración', price:62500, stars:5, reviews:3, badge:'Nuevo', image:'https://images.unsplash.com/photo-1616047006789-b7af5afb8c20?w=400&h=500&fit=crop&q=80' },
  { id:4, name:'Espejo Arco Natural', category:'Decoración', price:128000, stars:5, reviews:18, image:'https://images.unsplash.com/photo-1618220048045-10a6dbdf83e0?w=400&h=500&fit=crop&q=80' },
  { id:5, name:'Manta Merino Camel', category:'Textiles', price:54900, oldPrice:64900, stars:5, reviews:7, badge:'−15%', image:'https://images.unsplash.com/photo-1580301762395-21ce84d00bc6?w=400&h=500&fit=crop&q=80' },
  { id:6, name:'Vela Cedro & Sándalo', category:'Aromas', price:18900, stars:4, reviews:42, badge:'Popular', image:'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=400&h=500&fit=crop&q=80' },
];

const CATS = ['Todo','Iluminación','Textiles','Decoración','Vintage','Aromas'];

/* ── SCREENS ── */

const HomeScreen = ({ onProduct, onAddCart, cartCount }) => {
  const [cat, setCat] = useState('Todo');
  const filtered = cat === 'Todo' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  return (
    <div>
      {/* Header */}
      <div style={{ padding:'12px 20px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <img src="../../assets/logo.svg" height="28" alt="nook" />
        <div style={{ display:'flex', gap:'14px', alignItems:'center' }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--espresso)', display:'flex' }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--espresso)', display:'flex', position:'relative' }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            {cartCount > 0 && <span style={{ position:'absolute', top:'-4px', right:'-4px', background:'var(--gold)', color:'white', width:'16px', height:'16px', borderRadius:'50%', fontSize:'9px', fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>{cartCount}</span>}
          </button>
        </div>
      </div>

      {/* Hero banner */}
      <div style={{ margin:'8px 16px', borderRadius:'20px', overflow:'hidden', position:'relative', height:'220px' }}>
        <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800&h=500&fit=crop&q=80" style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="hero" />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(46,31,14,0.7) 0%, transparent 65%)' }} />
        <div style={{ position:'absolute', left:'20px', bottom:'20px', right:'40%' }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:'9px', fontWeight:600, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--gold-light)', marginBottom:'6px' }}>✦ Colección 2026</div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:'1.5rem', fontWeight:300, color:'white', lineHeight:1.2, marginBottom:'12px' }}>Tu rincón favorito empieza acá</h2>
          <button style={{ background:'var(--gold)', color:'white', border:'none', borderRadius:'var(--radius-pill)', padding:'8px 16px', fontSize:'11px', fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase', cursor:'pointer' }}>Explorá</button>
        </div>
      </div>

      {/* Category pills */}
      <div style={{ padding:'16px 16px 8px', overflowX:'auto', display:'flex', gap:'8px', WebkitOverflowScrolling:'touch' }}>
        {CATS.map(c => (
          <button key={c} onClick={() => setCat(c)} style={{ flexShrink:0, padding:'7px 16px', borderRadius:'var(--radius-pill)', border:'1.5px solid', borderColor: cat===c ? 'var(--espresso)':'var(--border-strong)', background: cat===c ? 'var(--espresso)':'transparent', color: cat===c ? 'var(--cream)':'var(--warm-gray)', fontFamily:'var(--font-body)', fontSize:'11px', fontWeight:500, letterSpacing:'0.07em', textTransform:'uppercase', cursor:'pointer' }}>{c}</button>
        ))}
      </div>

      {/* Section title */}
      <div style={{ padding:'12px 20px 0', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:'1.2rem', fontWeight:400, color:'var(--espresso)' }}>Destacados</h3>
        <a href="#" style={{ fontFamily:'var(--font-body)', fontSize:'11px', color:'var(--gold)', textDecoration:'none' }}>Ver todo →</a>
      </div>

      {/* Product grid */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', padding:'12px 16px 24px' }}>
        {filtered.map(p => (
          <div key={p.id} onClick={() => onProduct(p)} style={{ background:'var(--warm-white)', borderRadius:'16px', overflow:'hidden', border:'1px solid var(--border)', cursor:'pointer' }}>
            <div style={{ position:'relative', height:'180px', overflow:'hidden', background:'linear-gradient(145deg,#EEE0CC,#DFC9A8)' }}>
              <img src={p.image} alt={p.name} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
              {p.badge && <div style={{ position:'absolute', top:'8px', left:'8px', background: p.badge.includes('%') ? 'var(--espresso)':'var(--gold)', color:'white', fontSize:'8px', fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', padding:'3px 8px', borderRadius:'var(--radius-pill)' }}>{p.badge}</div>}
              <button onClick={e=>{ e.stopPropagation(); }} style={{ position:'absolute', top:'7px', right:'7px', background:'rgba(250,246,241,0.92)', border:'none', borderRadius:'50%', width:'28px', height:'28px', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:'13px', color:'#B8A090' }}>♡</button>
            </div>
            <div style={{ padding:'10px 12px 12px' }}>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'9px', letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--warm-gray)', marginBottom:'3px' }}>{p.category}</div>
              <div style={{ fontFamily:'var(--font-display)', fontSize:'0.92rem', color:'var(--espresso)', lineHeight:1.3, marginBottom:'6px' }}>{p.name}</div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div>
                  <span style={{ fontFamily:'var(--font-body)', fontSize:'14px', fontWeight:600, color:'var(--espresso)' }}>${(p.price/1000).toFixed(0)}k</span>
                  {p.oldPrice && <span style={{ fontFamily:'var(--font-body)', fontSize:'11px', color:'var(--warm-gray)', textDecoration:'line-through', marginLeft:'4px' }}>${(p.oldPrice/1000).toFixed(0)}k</span>}
                </div>
                <button onClick={e=>{ e.stopPropagation(); onAddCart(p); }} style={{ background:'var(--espresso)', color:'var(--cream)', border:'none', borderRadius:'50%', width:'28px', height:'28px', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:'16px', lineHeight:1 }}>+</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Trust badges */}
      <div style={{ margin:'0 16px 24px', background:'var(--warm-white)', borderRadius:'16px', padding:'16px', border:'1px solid var(--border)', display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
        {[{icon:'🚚',t:'Envío gratis',s:'+$50.000'},{icon:'🔒',t:'Pago seguro',s:'100% protegido'},{icon:'↩',t:'Devoluciones',s:'30 días gratis'},{icon:'★',t:'4.9 estrellas',s:'+3.200 clientas'}].map(({icon,t,s})=>(
          <div key={t} style={{ display:'flex', alignItems:'center', gap:'8px' }}>
            <span style={{ fontSize:'18px' }}>{icon}</span>
            <div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'11px', fontWeight:500, color:'var(--espresso)' }}>{t}</div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', color:'var(--warm-gray)' }}>{s}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const ProductScreen = ({ product, onBack, onAddCart }) => {
  const [qty, setQty] = useState(1);
  const [added, setAdded] = useState(false);
  if (!product) return null;
  const handleAdd = () => { onAddCart(product, qty); setAdded(true); setTimeout(()=>setAdded(false), 1800); };
  return (
    <div style={{ background:'var(--cream)' }}>
      {/* Image */}
      <div style={{ position:'relative', height:'380px', background:'linear-gradient(145deg,#EEE0CC,#DFC9A8)' }}>
        <img src={product.image} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
        <button onClick={onBack} style={{ position:'absolute', top:'16px', left:'16px', background:'rgba(250,246,241,0.92)', border:'none', borderRadius:'50%', width:'40px', height:'40px', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', backdropFilter:'blur(8px)' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--espresso)" strokeWidth="2" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button style={{ position:'absolute', top:'16px', right:'16px', background:'rgba(250,246,241,0.92)', border:'none', borderRadius:'50%', width:'40px', height:'40px', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:'18px', color:'#C9A0A0' }}>♡</button>
      </div>

      {/* Info */}
      <div style={{ padding:'24px 20px', background:'var(--warm-white)', borderRadius:'28px 28px 0 0', marginTop:'-20px', position:'relative' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px' }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--gold)', fontWeight:600 }}>{product.category}</div>
          <div style={{ color:'var(--gold)', fontSize:'12px' }}>{'★'.repeat(product.stars)} <span style={{ fontFamily:'var(--font-body)', fontSize:'11px', color:'var(--warm-gray)' }}>({product.reviews})</span></div>
        </div>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize:'1.8rem', fontWeight:300, color:'var(--espresso)', lineHeight:1.2, marginBottom:'12px' }}>{product.name}</h1>
        <div style={{ display:'flex', alignItems:'baseline', gap:'10px', marginBottom:'20px' }}>
          <span style={{ fontFamily:'var(--font-body)', fontSize:'22px', fontWeight:600, color:'var(--espresso)' }}>${product.price.toLocaleString('es-AR')}</span>
          {product.oldPrice && <span style={{ fontFamily:'var(--font-body)', fontSize:'15px', color:'var(--warm-gray)', textDecoration:'line-through' }}>${product.oldPrice.toLocaleString('es-AR')}</span>}
        </div>
        <p style={{ fontFamily:'var(--font-body)', fontSize:'14px', lineHeight:1.75, color:'var(--warm-gray)', marginBottom:'24px' }}>
          Una pieza seleccionada a mano que transforma cualquier rincón en un espacio con personalidad y calidez. Diseño moderno con toques artesanales.
        </p>

        {/* Options */}
        <div style={{ marginBottom:'20px' }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:'11px', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--espresso)', marginBottom:'10px' }}>Cantidad</div>
          <div style={{ display:'flex', alignItems:'center', gap:'16px' }}>
            <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{ width:'36px', height:'36px', borderRadius:'50%', border:'1.5px solid var(--border-strong)', background:'transparent', cursor:'pointer', fontSize:'18px', color:'var(--espresso)', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
            <span style={{ fontFamily:'var(--font-body)', fontSize:'16px', fontWeight:500, color:'var(--espresso)', minWidth:'20px', textAlign:'center' }}>{qty}</span>
            <button onClick={()=>setQty(q=>q+1)} style={{ width:'36px', height:'36px', borderRadius:'50%', border:'1.5px solid var(--border-strong)', background:'transparent', cursor:'pointer', fontSize:'18px', color:'var(--espresso)', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
          </div>
        </div>

        {/* Delivery info */}
        <div style={{ background:'var(--parchment)', borderRadius:'12px', padding:'12px 14px', marginBottom:'24px', display:'flex', gap:'10px', alignItems:'center' }}>
          <span style={{ fontSize:'18px' }}>🚚</span>
          <div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:'12px', fontWeight:500, color:'var(--espresso)' }}>Envío gratis a todo el país</div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:'11px', color:'var(--warm-gray)' }}>Llega en 3–5 días hábiles</div>
          </div>
        </div>

        {/* CTA */}
        <button onClick={handleAdd} style={{ width:'100%', padding:'16px', borderRadius:'var(--radius-pill)', border:'none', background: added ? 'var(--success)':'var(--espresso)', color:'var(--cream)', fontFamily:'var(--font-body)', fontSize:'13px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', transition:'background 300ms', marginBottom:'12px' }}>
          {added ? '✓ Agregado al carrito' : 'Agregar al carrito'}
        </button>
        <button style={{ width:'100%', padding:'14px', borderRadius:'var(--radius-pill)', border:'1.5px solid var(--border-strong)', background:'transparent', color:'var(--espresso)', fontFamily:'var(--font-body)', fontSize:'13px', fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase', cursor:'pointer' }}>
          Guardar en wishlist
        </button>
      </div>
    </div>
  );
};

const CartScreen = ({ items, onRemove, onBack }) => {
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'var(--cream)' }}>
      <div style={{ padding:'16px 20px', display:'flex', alignItems:'center', gap:'12px', borderBottom:'1px solid var(--border)', background:'var(--warm-white)' }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--espresso)', display:'flex', padding:'4px' }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:'1.3rem', fontWeight:400, color:'var(--espresso)' }}>Tu carrito · {items.length}</h2>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'16px' }}>
        {items.length === 0 ? (
          <div style={{ textAlign:'center', paddingTop:'60px' }}>
            <div style={{ opacity:0.2, marginBottom:'16px' }}>
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--espresso)" strokeWidth="1.5" strokeLinecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <p style={{ fontFamily:'var(--font-display)', fontSize:'1.1rem', color:'var(--warm-gray)', fontStyle:'italic' }}>Tu carrito espera por esas piezas que te enamoraron.</p>
          </div>
        ) : items.map((item,i) => (
          <div key={i} style={{ display:'flex', gap:'12px', padding:'14px 0', borderBottom:'1px solid var(--border)' }}>
            <div style={{ width:'72px', height:'72px', borderRadius:'12px', overflow:'hidden', background:'linear-gradient(145deg,#EEE0CC,#DFC9A8)', flexShrink:0 }}>
              <img src={item.image} alt={item.name} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'9px', letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--warm-gray)' }}>{item.category}</div>
              <div style={{ fontFamily:'var(--font-display)', fontSize:'0.95rem', color:'var(--espresso)', margin:'3px 0 6px', lineHeight:1.3 }}>{item.name}</div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontFamily:'var(--font-body)', fontSize:'14px', fontWeight:600, color:'var(--espresso)' }}>${(item.price*item.qty).toLocaleString('es-AR')}</span>
                <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                  <span style={{ fontFamily:'var(--font-body)', fontSize:'12px', color:'var(--warm-gray)' }}>×{item.qty}</span>
                  <button onClick={()=>onRemove(i)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--warm-gray)', fontSize:'14px' }}>✕</button>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
      {items.length > 0 && (
        <div style={{ padding:'16px 20px', background:'var(--warm-white)', borderTop:'1px solid var(--border)' }}>
          {total < 50000 && (
            <div style={{ marginBottom:'14px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--font-body)', fontSize:'11px', color:'var(--warm-gray)', marginBottom:'5px' }}>
                <span>Falta ${(50000-total).toLocaleString('es-AR')} para envío gratis</span>
                <span>{Math.round((total/50000)*100)}%</span>
              </div>
              <div style={{ height:'4px', background:'var(--sand)', borderRadius:'2px', overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${Math.min((total/50000)*100,100)}%`, background:'var(--gold)', borderRadius:'2px' }} />
              </div>
            </div>
          )}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'14px' }}>
            <span style={{ fontFamily:'var(--font-body)', fontSize:'12px', letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--warm-gray)' }}>Total</span>
            <span style={{ fontFamily:'var(--font-display)', fontSize:'1.5rem', fontWeight:500, color:'var(--espresso)' }}>${total.toLocaleString('es-AR')}</span>
          </div>
          <button style={{ width:'100%', padding:'15px', borderRadius:'var(--radius-pill)', background:'var(--espresso)', color:'var(--cream)', border:'none', fontFamily:'var(--font-body)', fontSize:'13px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' }}>
            Finalizar compra
          </button>
          <p style={{ textAlign:'center', fontFamily:'var(--font-body)', fontSize:'10px', color:'var(--warm-gray)', marginTop:'8px' }}>🔒 Pago seguro · Devoluciones gratis en 30 días</p>
        </div>
      )}
    </div>
  );
};

/* ── BOTTOM NAV ICONS ── */
const NavIcons = {
  home: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  search: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>,
  cart: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
  profile: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
};

const App = () => {
  const [screen, setScreen] = useState('home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const contentRef = useRef(null);

  const addToCart = (p, qty=1) => {
    setCart(prev => {
      const ex = prev.find(i=>i.id===p.id);
      return ex ? prev.map(i=>i.id===p.id?{...i,qty:i.qty+qty}:i) : [...prev,{...p,qty}];
    });
  };

  const goTo = (s) => {
    setScreen(s);
    if(contentRef.current) contentRef.current.scrollTop = 0;
  };

  const openProduct = (p) => { setSelectedProduct(p); goTo('product'); };

  const navItems = [
    { id:'home', label:'Inicio' },
    { id:'search', label:'Buscar' },
    { id:'cart', label:'Carrito' },
    { id:'profile', label:'Perfil' },
  ];

  return (
    <div className="phone-frame">
      {/* Status bar */}
      <div className="status-bar">
        <div className="dynamic-island" />
        <span className="status-time">9:41</span>
        <div className="status-icons">
          <svg width="15" height="11" viewBox="0 0 15 11" fill="var(--espresso)"><rect x="0" y="4" width="3" height="7" rx="1" opacity="0.3"/><rect x="4" y="2.5" width="3" height="8.5" rx="1" opacity="0.5"/><rect x="8" y="1" width="3" height="10" rx="1" opacity="0.7"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
          <svg width="15" height="11" viewBox="0 0 16 12" fill="none" stroke="var(--espresso)" strokeWidth="1.5"><path d="M1 4a9 9 0 0 1 14 0"/><path d="M3.5 6.5A6 6 0 0 1 12.5 6.5"/><path d="M6 9a3 3 0 0 1 4 0"/><circle cx="8" cy="11" r="1" fill="var(--espresso)"/></svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="var(--espresso)" strokeOpacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="2" fill="var(--espresso)"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="var(--espresso)" fillOpacity="0.4"/></svg>
        </div>
      </div>

      {/* Content */}
      <div className="phone-content" ref={contentRef}>
        {screen === 'home' && <HomeScreen onProduct={openProduct} onAddCart={addToCart} cartCount={cart.reduce((s,i)=>s+i.qty,0)} />}
        {screen === 'product' && <ProductScreen product={selectedProduct} onBack={()=>goTo('home')} onAddCart={addToCart} />}
        {screen === 'cart' && <CartScreen items={cart} onRemove={i=>setCart(prev=>prev.filter((_,j)=>j!==i))} onBack={()=>goTo('home')} />}
        {screen === 'search' && (
          <div style={{ padding:'20px', background:'var(--cream)', minHeight:'100%' }}>
            <h2 style={{ fontFamily:'var(--font-display)', fontSize:'1.4rem', color:'var(--espresso)', marginBottom:'14px', fontWeight:300 }}>Buscá tu rincón</h2>
            <input autoFocus placeholder="lámpara, textil, jarrón…" style={{ width:'100%', padding:'13px 18px', border:'1.5px solid var(--border-strong)', borderRadius:'var(--radius-pill)', background:'var(--warm-white)', fontFamily:'var(--font-body)', fontSize:'14px', color:'var(--espresso)', outline:'none', marginBottom:'24px' }} />
            <div style={{ fontFamily:'var(--font-body)', fontSize:'10px', fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--warm-gray)', marginBottom:'12px' }}>Categorías populares</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>
              {CATS.slice(1).map(c=><button key={c} onClick={()=>{setScreen('home');}} style={{ padding:'8px 16px', borderRadius:'var(--radius-pill)', border:'1.5px solid var(--border-strong)', background:'var(--warm-white)', fontFamily:'var(--font-body)', fontSize:'12px', color:'var(--espresso)', cursor:'pointer' }}>{c}</button>)}
            </div>
          </div>
        )}
        {screen === 'profile' && (
          <div style={{ padding:'20px', background:'var(--cream)', minHeight:'100%' }}>
            <div style={{ textAlign:'center', paddingTop:'32px', paddingBottom:'28px', borderBottom:'1px solid var(--border)', marginBottom:'20px' }}>
              <div style={{ width:'72px', height:'72px', borderRadius:'50%', background:'var(--parchment)', border:'2px solid var(--gold)', margin:'0 auto 14px', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--warm-gray)" strokeWidth="1.5" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div style={{ fontFamily:'var(--font-display)', fontSize:'1.2rem', color:'var(--espresso)', fontWeight:400 }}>Hola, Valentina</div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'12px', color:'var(--warm-gray)', marginTop:'4px' }}>valentina@email.com</div>
            </div>
            {['Mis pedidos','Mis favoritos','Mis direcciones','Notificaciones','Ayuda & FAQ','Cerrar sesión'].map((item,i)=>(
              <div key={item} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'15px 4px', borderBottom:'1px solid var(--border)', cursor:'pointer' }}>
                <span style={{ fontFamily:'var(--font-body)', fontSize:'14px', color: i===5?'var(--error)':'var(--espresso)' }}>{item}</span>
                {i<5 && <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warm-gray)" strokeWidth="1.8" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom nav */}
      <div className="bottom-nav">
        {navItems.map(item => {
          const isActive = screen === item.id || (screen==='product' && item.id==='home');
          return (
            <div key={item.id} className="nav-item" onClick={()=>goTo(item.id)} style={{ position:'relative' }}>
              <div style={{ color: isActive ? 'var(--espresso)':'var(--warm-gray)', transition:'color 200ms' }}>
                {NavIcons[item.id]}
              </div>
              {item.id==='cart' && cart.length>0 && (
                <span style={{ position:'absolute', top:'-4px', right:'-4px', background:'var(--gold)', color:'white', width:'16px', height:'16px', borderRadius:'50%', fontSize:'9px', fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>{cart.reduce((s,i)=>s+i.qty,0)}</span>
              )}
              <span className="nav-label" style={{ color: isActive ? 'var(--espresso)':'var(--warm-gray)' }}>{item.label}</span>
              {isActive && <div style={{ position:'absolute', bottom:'-8px', width:'4px', height:'4px', borderRadius:'50%', background:'var(--gold)' }} />}
            </div>
          );
        })}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
