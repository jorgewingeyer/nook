<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook — Producto Mobile</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#1A1410;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:var(--cream);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 40px 120px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.08),inset 0 0 0 1.5px rgba(0,0,0,0.3);display:flex;flex-direction:column}
  .status{height:52px;background:var(--warm-white);display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;flex-shrink:0;position:relative}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px}
  .content{flex:1;overflow-y:auto;overflow-x:hidden}
  .content::-webkit-scrollbar{display:none}
  .sticky-cta{flex-shrink:0;padding:12px 20px 28px;background:var(--warm-white);border-top:1px solid var(--border);display:flex;gap:12px;align-items:center}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .slide-up{animation:slideUp 350ms cubic-bezier(0.25,0,0.15,1) both}
</style>
</head>
<body>
<script type="text/babel">
const { useState, useRef } = React;

const PRODUCT = {
  name: 'Lámpara Arco Dorada',
  category: 'Iluminación',
  price: 89900,
  stars: 5,
  reviews: 24,
  badge: 'Nuevo ingreso',
  description: 'Una pieza que transforma cualquier rincón en un refugio de calma. Arco escultórico en metal lacado dorado mate y pantalla de lino natural.',
  images: [
    'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=800&h=900&fit=crop&q=85',
    'https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=800&h=900&fit=crop&q=85',
    'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&h=900&fit=crop&q=85',
    'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=800&h=900&fit=crop&q=85',
  ],
  specs: [
    { label:'Material', value:'Metal lacado + Lino' },
    { label:'Altura', value:'175 cm' },
    { label:'Pantalla', value:'42 cm diámetro' },
    { label:'Potencia', value:'E27 · máx 40W' },
  ],
  related: [
    { name:'Jarrón Osaka', price:62500, img:'https://images.unsplash.com/photo-1616047006789-b7af5afb8c20?w=200&h=200&fit=crop&q=80' },
    { name:'Vela Cedro', price:18900, img:'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=200&h=200&fit=crop&q=80' },
    { name:'Copas Bohemia', price:38900, img:'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=200&h=200&fit=crop&q=80' },
  ],
};

const Accordion = ({ title, children }) => {
  const [open,setOpen]=useState(false);
  return (
    <div style={{borderBottom:'1px solid var(--border)'}}>
      <button onClick={()=>setOpen(!open)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:500,color:'var(--espresso)'}}>
        {title}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warm-gray)" strokeWidth="2" strokeLinecap="round" style={{transition:'transform 240ms',transform:open?'rotate(180deg)':'none'}}><path d="m6 9 6 6 6-6"/></svg>
      </button>
      {open && <div style={{paddingBottom:'14px'}}>{children}</div>}
    </div>
  );
};

const App = () => {
  const [activeImg,setActiveImg]=useState(0);
  const [qty,setQty]=useState(1);
  const [wished,setWished]=useState(false);
  const [added,setAdded]=useState(false);
  const [sheet,setSheet]=useState(null); // 'qty' | 'share'
  const contentRef=useRef(null);

  const handleAdd = () => {
    setAdded(true);
    setTimeout(()=>setAdded(false),2000);
  };

  return (
    <div className="phone">
      {/* Status bar */}
      <div className="status">
        <div className="island"/>
        <span style={{fontFamily:'var(--font-body)',fontSize:'15px',fontWeight:600,color:'var(--espresso)'}}>9:41</span>
        <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="var(--espresso)"><rect x="0" y="4" width="3" height="7" rx="1" opacity="0.3"/><rect x="4" y="2.5" width="3" height="8.5" rx="1" opacity="0.5"/><rect x="8" y="1" width="3" height="10" rx="1" opacity="0.7"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="var(--espresso)" strokeOpacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="2" fill="var(--espresso)"/></svg>
        </div>
      </div>

      {/* Scrollable content */}
      <div className="content" ref={contentRef}>
        {/* Image gallery */}
        <div style={{position:'relative',height:'380px',background:'var(--parchment)',flexShrink:0,overflow:'hidden'}}>
          <img src={PRODUCT.images[activeImg]} alt={PRODUCT.name} style={{width:'100%',height:'100%',objectFit:'cover',transition:'opacity 300ms'}}/>
          {/* Top bar */}
          <div style={{position:'absolute',top:0,left:0,right:0,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(to bottom,rgba(46,31,14,0.35),transparent)'}}>
            <a href="index-mobile.html" style={{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(250,246,241,0.9)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)'}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--espresso)" strokeWidth="2" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setSheet('share')} style={{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(250,246,241,0.9)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',backdropFilter:'blur(8px)'}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--espresso)" strokeWidth="2" strokeLinecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              </button>
              <button onClick={()=>setWished(!wished)} style={{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(250,246,241,0.9)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'18px',color:wished?'#C9A0A0':'#B8A090',backdropFilter:'blur(8px)'}}>
                {wished?'♥':'♡'}
              </button>
            </div>
          </div>
          {/* Badge */}
          <div style={{position:'absolute',bottom:'60px',left:'16px',background:'var(--gold)',color:'white',fontSize:'9px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'4px 10px',borderRadius:'var(--radius-pill)',fontFamily:'var(--font-body)'}}>{PRODUCT.badge}</div>
          {/* Thumb dots */}
          <div style={{position:'absolute',bottom:'16px',left:'50%',transform:'translateX(-50%)',display:'flex',gap:'6px'}}>
            {PRODUCT.images.map((_,i)=>(
              <button key={i} onClick={()=>setActiveImg(i)} style={{width: i===activeImg?20:6,height:6,borderRadius:'3px',background: i===activeImg?'white':'rgba(255,255,255,0.5)',border:'none',cursor:'pointer',transition:'all 250ms',padding:0}}/>
            ))}
          </div>
        </div>

        {/* Thumbnails row */}
        <div style={{display:'flex',gap:'8px',padding:'12px 16px',overflowX:'auto',background:'var(--warm-white)',borderBottom:'1px solid var(--border)'}}>
          {PRODUCT.images.map((img,i)=>(
            <div key={i} onClick={()=>setActiveImg(i)} style={{width:'56px',height:'56px',borderRadius:'8px',overflow:'hidden',flexShrink:0,cursor:'pointer',border:`2px solid ${i===activeImg?'var(--gold)':'transparent'}`,transition:'border-color 200ms',background:'var(--parchment)'}}>
              <img src={img} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity:i===activeImg?1:0.65,transition:'opacity 200ms'}}/>
            </div>
          ))}
        </div>

        {/* Product info */}
        <div style={{background:'var(--warm-white)',padding:'20px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
            <span style={{fontFamily:'var(--font-body)',fontSize:'10px',fontWeight:600,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--gold)'}}>{PRODUCT.category}</span>
            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
              <span style={{color:'var(--gold)',fontSize:'12px',letterSpacing:'1px'}}>{'★'.repeat(PRODUCT.stars)}</span>
              <span style={{fontFamily:'var(--font-body)',fontSize:'11px',color:'var(--warm-gray)'}}>({PRODUCT.reviews})</span>
            </div>
          </div>
          <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.7rem',fontWeight:300,color:'var(--espresso)',lineHeight:1.2,marginBottom:'12px'}}>{PRODUCT.name}</h1>
          <div style={{display:'flex',alignItems:'baseline',gap:'10px',marginBottom:'16px'}}>
            <span style={{fontFamily:'var(--font-body)',fontSize:'24px',fontWeight:600,color:'var(--espresso)'}}>${PRODUCT.price.toLocaleString('es-AR')}</span>
            <span style={{fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--warm-gray)'}}>IVA incluido</span>
            <span style={{fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--sage)',fontWeight:500}}>✓ En stock</span>
          </div>
          <p style={{fontFamily:'var(--font-body)',fontSize:'14px',lineHeight:1.75,color:'var(--warm-gray)',marginBottom:'20px'}}>{PRODUCT.description}</p>

          {/* Qty row */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',paddingBottom:'20px',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--espresso)'}}>Cantidad</span>
            <div style={{display:'flex',alignItems:'center',gap:'0',border:'1.5px solid var(--border-strong)',borderRadius:'var(--radius-pill)',overflow:'hidden'}}>
              <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:'40px',height:'40px',background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'var(--espresso)',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
              <span style={{minWidth:'36px',textAlign:'center',fontFamily:'var(--font-body)',fontSize:'15px',fontWeight:500,color:'var(--espresso)'}}>{qty}</span>
              <button onClick={()=>setQty(q=>q+1)} style={{width:'40px',height:'40px',background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'var(--espresso)',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>
          </div>

          {/* Delivery */}
          <div style={{display:'flex',flexDirection:'column',gap:'0',marginBottom:'20px',borderRadius:'var(--radius-md)',overflow:'hidden',border:'1px solid var(--border)'}}>
            {[{icon:'🚚',t:'Envío gratis',s:'A todo el país · 3–5 días'},{icon:'↩',t:'Devoluciones gratis',s:'30 días sin preguntas'},{icon:'🔒',t:'Pago seguro',s:'Todas las tarjetas'}].map(({icon,t,s},i,arr)=>(
              <div key={t} style={{display:'flex',gap:'12px',padding:'12px 14px',background:'var(--parchment)',borderBottom: i<arr.length-1?'1px solid var(--border)':'none',alignItems:'center'}}>
                <span style={{fontSize:'16px'}}>{icon}</span>
                <div>
                  <div style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:500,color:'var(--espresso)'}}>{t}</div>
                  <div style={{fontFamily:'var(--font-body)',fontSize:'11px',color:'var(--warm-gray)'}}>{s}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Accordions */}
          <Accordion title="Especificaciones técnicas">
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {PRODUCT.specs.map(({label,value})=>(
                <div key={label} style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontFamily:'var(--font-body)',fontSize:'11px',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--warm-gray)'}}>{label}</span>
                  <span style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--espresso)',textAlign:'right',maxWidth:'55%'}}>{value}</span>
                </div>
              ))}
            </div>
          </Accordion>
          <Accordion title="Cuidados y mantenimiento">
            <p style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--warm-gray)',lineHeight:1.7}}>Limpiar la base con paño seco. La pantalla puede limpiarse con pincel suave. Evitar humedad directa.</p>
          </Accordion>
          <Accordion title="Envío y devoluciones">
            <p style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'var(--warm-gray)',lineHeight:1.7}}>Despachamos en 48hs hábiles. Devoluciones sin costo dentro de los 30 días en embalaje original.</p>
          </Accordion>
        </div>

        {/* Reviews */}
        <div style={{padding:'20px',background:'var(--cream)',marginTop:'8px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.2rem',fontWeight:400,color:'var(--espresso)'}}>Reseñas</h3>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <span style={{color:'var(--gold)',fontSize:'14px'}}>★</span>
              <span style={{fontFamily:'var(--font-body)',fontSize:'14px',fontWeight:600,color:'var(--espresso)'}}>4.9</span>
              <span style={{fontFamily:'var(--font-body)',fontSize:'12px',color:'var(--warm-gray)'}}>({PRODUCT.reviews})</span>
            </div>
          </div>
          {[
            {name:'Valentina M.',stars:5,text:'"Llegó impecable y es aún más linda en persona. Transforma completamente el rincón de lectura."'},
            {name:'Carolina B.',stars:5,text:'"El dorado es elegante, no ordinario. El servicio de Nook fue excelente."'},
          ].map((r,i)=>(
            <div key={i} style={{background:'var(--warm-white)',borderRadius:'var(--radius-md)',padding:'16px',border:'1px solid var(--border)',marginBottom:'10px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
                <span style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:500,color:'var(--espresso)'}}>{r.name}</span>
                <span style={{color:'var(--gold)',fontSize:'12px'}}>{'★'.repeat(r.stars)}</span>
              </div>
              <p style={{fontFamily:'var(--font-display)',fontSize:'0.95rem',fontStyle:'italic',color:'var(--espresso)',lineHeight:1.6}}>{r.text}</p>
            </div>
          ))}
        </div>

        {/* Related */}
        <div style={{padding:'20px',background:'var(--warm-white)',marginTop:'8px'}}>
          <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.1rem',fontWeight:400,color:'var(--espresso)',marginBottom:'14px'}}>Completá tu rincón</h3>
          <div style={{display:'flex',gap:'12px',overflowX:'auto',paddingBottom:'4px',WebkitOverflowScrolling:'touch'}}>
            {PRODUCT.related.map((r,i)=>(
              <div key={i} style={{flexShrink:0,width:'130px',background:'var(--cream)',borderRadius:'12px',overflow:'hidden',border:'1px solid var(--border)',cursor:'pointer'}}>
                <div style={{height:'120px',background:'var(--parchment)',overflow:'hidden'}}>
                  <img src={r.img} alt={r.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                </div>
                <div style={{padding:'8px 10px'}}>
                  <div style={{fontFamily:'var(--font-display)',fontSize:'0.85rem',color:'var(--espresso)',lineHeight:1.3,marginBottom:'4px'}}>{r.name}</div>
                  <div style={{fontFamily:'var(--font-body)',fontSize:'12px',fontWeight:600,color:'var(--espresso)'}}>${(r.price/1000).toFixed(0)}k</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{height:'20px'}}/>
      </div>

      {/* Sticky CTA */}
      <div className="sticky-cta">
        <div style={{flex:1}}>
          <div style={{fontFamily:'var(--font-body)',fontSize:'10px',letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--warm-gray)',marginBottom:'2px'}}>Total</div>
          <div style={{fontFamily:'var(--font-display)',fontSize:'1.2rem',fontWeight:500,color:'var(--espresso)'}}>${(PRODUCT.price*qty).toLocaleString('es-AR')}</div>
        </div>
        <button onClick={handleAdd} style={{flex:2,padding:'14px',borderRadius:'var(--radius-pill)',border:'none',background: added?'var(--success)':'var(--espresso)',color:'var(--cream)',fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:500,letterSpacing:'0.09em',textTransform:'uppercase',cursor:'pointer',transition:'background 300ms'}}>
          {added ? '✓ Agregado' : `Agregar · ×${qty}`}
        </button>
      </div>

      {/* Bottom sheet: share */}
      {sheet==='share' && (
        <div style={{position:'absolute',inset:0,zIndex:200}}>
          <div onClick={()=>setSheet(null)} style={{position:'absolute',inset:0,background:'rgba(46,31,14,0.4)',backdropFilter:'blur(4px)'}}/>
          <div className="slide-up" style={{position:'absolute',bottom:0,left:0,right:0,background:'var(--warm-white)',borderRadius:'24px 24px 0 0',padding:'24px 20px 40px'}}>
            <div style={{width:'36px',height:'4px',background:'var(--sand)',borderRadius:'2px',margin:'0 auto 20px'}}/>
            <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.2rem',fontWeight:400,color:'var(--espresso)',textAlign:'center',marginBottom:'20px'}}>Compartir producto</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px'}}>
              {['WhatsApp','Instagram','Copiar link','Email'].map(s=>(
                <button key={s} onClick={()=>setSheet(null)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',background:'none',border:'none',cursor:'pointer',padding:'12px',borderRadius:'12px',background:'var(--parchment)'}}>
                  <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--espresso)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cream)" strokeWidth="1.8" strokeLinecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  </div>
                  <span style={{fontFamily:'var(--font-body)',fontSize:'10px',color:'var(--espresso)',letterSpacing:'0.04em'}}>{s}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
